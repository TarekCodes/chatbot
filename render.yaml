services:
  - type: web
    name: chatbot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false          # you'll paste this in the Render dashboard
      - key: ADMIN_KEY
        sync: false
      - key: SYSTEM_PROMPT
        sync: false
    disk:
      name: chroma-data
      mountPath: /app/chroma_db
      sizeGB: 1
