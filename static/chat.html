<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%; overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 15px; background: #fff; color: #111;
    }

    #chat {
      display: flex; flex-direction: column; height: 100%;
    }

    /* ── Header ── */
    #header {
      background: linear-gradient(135deg, #7dd3fc 0%, #ffffff 100%);
      color: #0369a1;
      padding: 14px 18px; display: flex; align-items: center; gap: 10px;
      flex-shrink: 0; border-bottom: 1px solid #bae6fd;
    }
    #header svg { width: 20px; height: 20px; fill: #0369a1; flex-shrink: 0; }
    #header-title { font-weight: 600; font-size: 15px; }

    /* ── Messages ── */
    #messages {
      flex: 1; overflow-y: auto; padding: 16px 14px;
      display: flex; flex-direction: column; gap: 12px;
      background: #f9fafb;
    }

    .msg { display: flex; flex-direction: column; max-width: 80%; }
    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.bot  { align-self: flex-start; }

    .bubble {
      padding: 10px 14px; border-radius: 16px;
      line-height: 1.55; word-break: break-word; font-size: 14px;
    }
    .user .bubble {
      background: #38bdf8; color: #fff;
      border-bottom-right-radius: 4px; white-space: pre-wrap;
    }
    .bot .bubble {
      background: #fff; color: #111;
      border: 1px solid #e5e7eb;
      border-bottom-left-radius: 4px;
    }
    .bot .bubble strong { font-weight: 700; }
    .bot .bubble em { font-style: italic; }
    .bot .bubble code {
      background: #f3f4f6; border: 1px solid #e5e7eb;
      border-radius: 4px; padding: 1px 5px; font-family: monospace; font-size: 13px;
    }
    .bot .bubble pre {
      background: #1e293b; color: #e2e8f0; border-radius: 8px;
      padding: 10px 12px; margin: 6px 0; overflow-x: auto; font-size: 13px;
    }
    .bot .bubble pre code {
      background: none; border: none; padding: 0; color: inherit; font-size: inherit;
    }
    .bot .bubble ul { padding-left: 20px; margin: 6px 0; }
    .bot .bubble ol { padding-left: 20px; margin: 6px 0; }
    .bot .bubble li { margin: 3px 0; }
    .bot .bubble p { margin: 0 0 8px; }
    .bot .bubble p:last-child { margin-bottom: 0; }
    .bot .bubble h1, .bot .bubble h2, .bot .bubble h3 {
      font-size: 14px; font-weight: 700; margin: 8px 0 4px;
    }

    /* typing dots */
    .typing { display: flex; gap: 5px; align-items: center;
              padding: 12px 14px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #9ca3af;
           animation: bounce .9s infinite; }
    .dot:nth-child(2) { animation-delay: .15s; }
    .dot:nth-child(3) { animation-delay: .30s; }
    @keyframes bounce {
      0%,80%,100% { transform: translateY(0); }
      40%          { transform: translateY(-5px); }
    }

    /* ── Input ── */
    #input-area {
      padding: 12px 14px; border-top: 1px solid #e5e7eb;
      display: flex; gap: 8px; align-items: flex-end;
      background: #fff; flex-shrink: 0;
    }
    #input {
      flex: 1; padding: 9px 13px; border: 1px solid #d1d5db;
      border-radius: 10px; font-size: 14px; font-family: inherit;
      resize: none; outline: none; line-height: 1.45; max-height: 120px;
      overflow-y: auto;
    }
    #input:focus { border-color: #38bdf8; }
    #send {
      background: #38bdf8; color: #fff; border: none; border-radius: 10px;
      padding: 9px 16px; cursor: pointer; font-size: 14px; font-weight: 500;
      transition: opacity .15s; white-space: nowrap; flex-shrink: 0;
    }
    #send:disabled { opacity: .45; cursor: default; }
    #char-count {
      font-size: 11px; color: #9ca3af; text-align: right;
      padding: 2px 4px 0;
    }
    #char-count.near-limit { color: #f97316; }
    #char-count.at-limit { color: #ef4444; }
  </style>
</head>
<body>
<div id="chat">
  <div id="header">
    <svg viewBox="0 0 24 24"><path d="M20 2H4a2 2 0 00-2 2v18l4-4h14a2 2 0 002-2V4a2 2 0 00-2-2z"/></svg>
    <span id="header-title">Chat with us</span>
  </div>

  <div id="messages"></div>

  <div id="input-area">
    <textarea id="input" rows="1" placeholder="Type your message…" maxlength="600"></textarea>
    <div id="char-count">0 / 600</div>
    <button id="send">Send</button>
  </div>
</div>

<script>
  // Config can be overridden via URL params: ?title=...&color=...&welcome=...
  var params = new URLSearchParams(window.location.search);
  var TITLE   = params.get('title')   || 'Dream Interpretation';
  var COLOR   = params.get('color')   || '#38bdf8';
  var WELCOME = params.get('welcome') || 'Al Salam Alaikum, please tell me about your dream!';

  document.getElementById('header-title').textContent = TITLE;

  var style = document.createElement('style');
  style.textContent = '.user .bubble { background: ' + COLOR + ' !important; } #input:focus { border-color: ' + COLOR + ' !important; } #send { background: ' + COLOR + ' !important; }';
  document.head.appendChild(style);

  var messages = document.getElementById('messages');
  var input    = document.getElementById('input');
  var sendBtn  = document.getElementById('send');
  var chatHistory = [];
  var SESSION_ID = crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2);
  var PAGE_URL   = document.referrer || window.location.href;

  addBotMsg(WELCOME);

  function addBotMsg(text) {
    var d = document.createElement('div');
    d.className = 'msg bot';
    d.innerHTML = '<div class="bubble">' + mdToHtml(text) + '</div>';
    messages.appendChild(d);
    scrollDown();
    return d;
  }

  function addUserMsg(text) {
    var d = document.createElement('div');
    d.className = 'msg user';
    d.innerHTML = '<div class="bubble">' + esc(text) + '</div>';
    messages.appendChild(d);
    scrollDown();
  }

  function showTyping() {
    var d = document.createElement('div');
    d.className = 'msg bot';
    d.innerHTML = '<div class="bubble typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>';
    messages.appendChild(d);
    scrollDown();
    return d;
  }

  function scrollDown() { messages.scrollTop = messages.scrollHeight; }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  marked.setOptions({ breaks: true, gfm: true });

  function mdToHtml(text) {
    return marked.parse(text);
  }

  async function send() {
    var text = input.value.trim();
    if (!text || sendBtn.disabled) return;

    input.value = '';
    input.style.height = 'auto';
    charCount.textContent = '0 / 600';
    charCount.className = '';
    sendBtn.disabled = true;
    addUserMsg(text);
    var typing = showTyping();

    try {
      var res = await fetch('/api/chat/stream', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, history: chatHistory, session_id: SESSION_ID, page_url: PAGE_URL })
      });
      if (!res.ok) {
        var errData = await res.json().catch(function() { return {}; });
        var detail = errData.detail;
        if (Array.isArray(detail)) detail = detail.map(function(e) { return e.loc.join('.') + ': ' + e.msg; }).join('; ');
        throw new Error('Server error ' + res.status + (detail ? ': ' + detail : ''));
      }

      var botDiv = null;
      var bubble = null;
      var replyText = '';

      var reader = res.body.getReader();
      var decoder = new TextDecoder();
      var buf = '';

      while (true) {
        var chunk = await reader.read();
        if (chunk.done) break;
        buf += decoder.decode(chunk.value, { stream: true });
        var lines = buf.split('\n');
        buf = lines.pop();
        for (var i = 0; i < lines.length; i++) {
          var line = lines[i];
          if (!line.startsWith('data: ')) continue;
          var payload = JSON.parse(line.slice(6));
          if (payload.error) throw new Error(payload.error);
          if (payload.token) {
            if (!botDiv) {
              typing.remove();
              botDiv = addBotMsg('');
              bubble = botDiv.querySelector('.bubble');
            }
            replyText += payload.token;
            bubble.innerHTML = mdToHtml(replyText);
            scrollDown();
          }
        }
      }

      if (!botDiv) { typing.remove(); }
      if (!replyText) replyText = 'Sorry, I could not get a response.';
      if (!botDiv) addBotMsg(replyText);
      chatHistory.push({ role: 'user', content: text });
      chatHistory.push({ role: 'assistant', content: replyText });
      if (chatHistory.length > 20) chatHistory = chatHistory.slice(-20);

    } catch(e) {
      console.error('[Chat error]', e);
      typing.remove();
      addBotMsg('Error: ' + e.message);
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }

  sendBtn.addEventListener('click', send);
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
  var charCount = document.getElementById('char-count');
  input.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    var len = this.value.length;
    charCount.textContent = len + ' / 600';
    charCount.className = len >= 600 ? 'at-limit' : len >= 500 ? 'near-limit' : '';
  });
</script>
</body>
</html>
