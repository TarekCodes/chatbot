<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%; overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 15px; background: #fff; color: #111;
    }

    #chat {
      display: flex; flex-direction: column; height: 100%;
    }

    /* ── Header ── */
    #header {
      background: #4f46e5; color: #fff;
      padding: 14px 18px; display: flex; align-items: center; gap: 10px;
      flex-shrink: 0;
    }
    #header svg { width: 20px; height: 20px; fill: #fff; flex-shrink: 0; }
    #header-title { font-weight: 600; font-size: 15px; }

    /* ── Messages ── */
    #messages {
      flex: 1; overflow-y: auto; padding: 16px 14px;
      display: flex; flex-direction: column; gap: 12px;
      background: #f9fafb;
    }

    .msg { display: flex; flex-direction: column; max-width: 80%; }
    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.bot  { align-self: flex-start; }

    .bubble {
      padding: 10px 14px; border-radius: 16px;
      line-height: 1.55; white-space: pre-wrap; word-break: break-word;
      font-size: 14px;
    }
    .user .bubble {
      background: #4f46e5; color: #fff;
      border-bottom-right-radius: 4px;
    }
    .bot .bubble {
      background: #fff; color: #111;
      border: 1px solid #e5e7eb;
      border-bottom-left-radius: 4px;
    }

    /* typing dots */
    .typing { display: flex; gap: 5px; align-items: center;
              padding: 12px 14px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #9ca3af;
           animation: bounce .9s infinite; }
    .dot:nth-child(2) { animation-delay: .15s; }
    .dot:nth-child(3) { animation-delay: .30s; }
    @keyframes bounce {
      0%,80%,100% { transform: translateY(0); }
      40%          { transform: translateY(-5px); }
    }

    /* ── Input ── */
    #input-area {
      padding: 12px 14px; border-top: 1px solid #e5e7eb;
      display: flex; gap: 8px; align-items: flex-end;
      background: #fff; flex-shrink: 0;
    }
    #input {
      flex: 1; padding: 9px 13px; border: 1px solid #d1d5db;
      border-radius: 10px; font-size: 14px; font-family: inherit;
      resize: none; outline: none; line-height: 1.45; max-height: 120px;
      overflow-y: auto;
    }
    #input:focus { border-color: #4f46e5; }
    #send {
      background: #4f46e5; color: #fff; border: none; border-radius: 10px;
      padding: 9px 16px; cursor: pointer; font-size: 14px; font-weight: 500;
      transition: opacity .15s; white-space: nowrap; flex-shrink: 0;
    }
    #send:disabled { opacity: .45; cursor: default; }
  </style>
</head>
<body>
<div id="chat">
  <div id="header">
    <svg viewBox="0 0 24 24"><path d="M20 2H4a2 2 0 00-2 2v18l4-4h14a2 2 0 002-2V4a2 2 0 00-2-2z"/></svg>
    <span id="header-title">Chat with us</span>
  </div>

  <div id="messages"></div>

  <div id="input-area">
    <textarea id="input" rows="1" placeholder="Type your message…"></textarea>
    <button id="send">Send</button>
  </div>
</div>

<script>
  // Config can be overridden via URL params: ?title=...&color=...&welcome=...
  var params = new URLSearchParams(window.location.search);
  var TITLE   = params.get('title')   || 'Chat with us';
  var COLOR   = params.get('color')   || '#4f46e5';
  var WELCOME = params.get('welcome') || 'Hi! How can I help you today?';

  document.getElementById('header-title').textContent = TITLE;
  document.querySelector('#header').style.background = COLOR;
  document.querySelector('.user .bubble') && (document.querySelector('.user .bubble').style.background = COLOR);
  document.getElementById('input').style.setProperty('--focus-color', COLOR);
  document.getElementById('send').style.background = COLOR;

  // Apply color to dynamically created user bubbles via CSS variable
  var style = document.createElement('style');
  style.textContent = '.user .bubble { background: ' + COLOR + ' !important; } #input:focus { border-color: ' + COLOR + ' !important; } #send { background: ' + COLOR + ' !important; }';
  document.head.appendChild(style);

  var messages = document.getElementById('messages');
  var input    = document.getElementById('input');
  var sendBtn  = document.getElementById('send');
  var history  = [];

  addBotMsg(WELCOME);

  function addBotMsg(text) {
    var d = document.createElement('div');
    d.className = 'msg bot';
    d.innerHTML = '<div class="bubble">' + esc(text) + '</div>';
    messages.appendChild(d);
    scrollDown();
    return d;
  }

  function addUserMsg(text) {
    var d = document.createElement('div');
    d.className = 'msg user';
    d.innerHTML = '<div class="bubble">' + esc(text) + '</div>';
    messages.appendChild(d);
    scrollDown();
  }

  function showTyping() {
    var d = document.createElement('div');
    d.className = 'msg bot';
    d.innerHTML = '<div class="bubble typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>';
    messages.appendChild(d);
    scrollDown();
    return d;
  }

  function scrollDown() { messages.scrollTop = messages.scrollHeight; }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  async function send() {
    var text = input.value.trim();
    if (!text || sendBtn.disabled) return;

    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;
    addUserMsg(text);
    var typing = showTyping();

    try {
      var res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, history: history })
      });
      if (!res.ok) throw new Error('Server error ' + res.status);
      var data = await res.json();
      var reply = data.reply || 'Sorry, I could not get a response.';

      history.push({ role: 'user', content: text });
      history.push({ role: 'assistant', content: reply });
      if (history.length > 20) history = history.slice(-20);

      typing.remove();
      addBotMsg(reply);
    } catch(e) {
      typing.remove();
      addBotMsg('Sorry, something went wrong. Please try again.');
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }

  sendBtn.addEventListener('click', send);
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
  input.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });
</script>
</body>
</html>
